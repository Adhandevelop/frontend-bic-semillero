<section class="form-card panel">
  <div class="page-header">
    <h1>{{ editando ? 'Editar conductor' : 'Nuevo conductor' }}</h1>
  </div>

  <div class="alert alert-error" *ngIf="error">{{ error }}</div>
  <div class="alert alert-success" *ngIf="success">{{ success }}</div>
  <div class="loading" *ngIf="loading">Procesando...</div>

  <form class="form-grid" [formGroup]="form" (ngSubmit)="guardar()" *ngIf="!loading || editando">
    <div class="form-field">
      <label for="nombre">Nombre</label>
      <input id="nombre" type="text" formControlName="nombre">
      <span class="field-error" *ngIf="form.controls.nombre.touched && form.controls.nombre.invalid">El nombre es obligatorio.</span>
    </div>

    <div class="form-field">
      <label for="licencia">Licencia</label>
      <input id="licencia" type="text" formControlName="licencia">
      <span class="field-error" *ngIf="form.controls.licencia.touched && form.controls.licencia.invalid">La licencia es obligatoria.</span>
    </div>

    <div class="form-field">
      <label for="telefono">Teléfono</label>
      <input id="telefono" type="text" formControlName="telefono">
    </div>

    <div class="form-field">
      <label for="estado">Estado</label>
      <select id="estado" formControlName="estado">
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>
      <span class="field-error" *ngIf="form.controls.estado.touched && form.controls.estado.invalid">El estado es obligatorio.</span>
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="submit" [disabled]="loading">Guardar</button>
      <a class="btn btn-secondary" routerLink="/conductores">Cancelar</a>
    </div>
  </form>
</section>
