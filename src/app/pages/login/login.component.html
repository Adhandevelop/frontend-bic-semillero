<main class="login-page">
  <section class="login-card">
    <div class="login-heading">
      <span>Sistema académico</span>
      <h1>Gestión de Transporte</h1>
      <p>Ingresa con tu usuario para administrar buses, conductores, rutas y viajes.</p>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="success">{{ success }}</div>

    <form class="form-grid" [formGroup]="form" (ngSubmit)="ingresar()">
      <div class="form-field">
        <label for="username">Usuario</label>
        <input id="username" type="text" autocomplete="username" formControlName="username">
        <span class="field-error" *ngIf="form.controls.username.touched && form.controls.username.invalid">El usuario es obligatorio.</span>
      </div>

      <div class="form-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" formControlName="password">
        <span class="field-error" *ngIf="form.controls.password.touched && form.controls.password.invalid">La contraseña es obligatoria.</span>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </section>
</main>
